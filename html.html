<html>
    <head>
        <title>HTML</title>
        <style>
            body{
                background-color: rgb(249, 249, 102);

            nav{
                color: rgb(255, 128, 0);

                padding: 20px 30px;
            }
            center{
                color: rgb(255, 0, 0);
                text-shadow:2px 2px rgb(100, 210, 3);

        <nav>

                <div class="head">
